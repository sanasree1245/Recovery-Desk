<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECOVERY DISK | Cross-Notification</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root { 
            --gold: #d4af37; 
            --primary: #00f2fe;
            --silver: #c0c0c0; 
            --bg: #050505; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* 3D BACKGROUND */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* GLASS CONTAINER */
        .container { 
            background: rgba(10, 10, 10, 0.85); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 45px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 550px; 
            text-align: center; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--gold); font-size: 24px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; }
        
        #loading { font-size: 12px; letter-spacing: 2px; color: var(--primary); font-weight: bold; }

        /* DATA CARDS */
        .data-card { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            text-align: left; 
            border: 1px solid rgba(255,255,255,0.08); 
            position: relative;
            transition: 0.3s;
        }
        .data-card:hover { background: rgba(255,255,255,0.06); transform: scale(1.02); }

        .label { color: var(--gold); font-size: 10px; font-weight: 800; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .val-text { font-size: 15px; color: #fff; line-height: 1.6; }
        .val-text b { color: var(--primary); }

        .btn-sync { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(45deg, var(--gold), #f1c40f); 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 20px; 
            transition: 0.4s; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .btn-sync:hover { filter: brightness(1.2); box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); transform: translateY(-3px); }

        .return-link { margin-top: 25px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .return-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <h1>Protocol Gateway</h1>
        
        <div id="loading">INITIALIZING SECURE CROSS-CHECK...</div>

        <div id="portalContent" style="display:none;">
            <div class="data-card" style="border-top: 2px solid var(--primary);">
                <span class="label">Identified Asset</span>
                <p id="itemName" style="font-size: 20px; color: var(--gold); font-weight: 900;"></p>
            </div>

            <div class="data-card" style="border-left: 4px solid #ef4444;">
                <span class="label">Matched Owner</span>
                <p class="val-text">ID: <b id="ownerID"></b></p>
                <p class="val-text">Email: <span id="ownerEmail" style="color:var(--silver)"></span></p>
            </div>

            <div class="data-card" style="border-left: 4px solid #22c55e;">
                <span class="label">Matched Finder</span>
                <p class="val-text">ID: <b id="finderID"></b></p>
                <p class="val-text">Email: <span id="finderEmail" style="color:var(--silver)"></span></p>
            </div>

            <button class="btn-sync" onclick="triggerCrossEmails()">Execute Alert Broadcast</button>
            <p class="return-link" onclick="window.location.href='admin.html'"><i class="fas fa-arrow-left"></i> Return to Admin Command</p>
        </div>
    </div>

    <script>
        /* 1. 3D BACKGROUND ENGINE */
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 5000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00f2fe, size: 1.2, transparent: true, opacity: 0.5 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        camera.position.z = 500;

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }
        animate();

        /* 2. FIREBASE & CROSS-NOTIFICATION LOGIC */
        const firebaseConfig = { apiKey: "AiZaSyDg1bSCdLj2Em-1WhLInzHevEGT4apSM7U", projectId: "first-rtrp" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const oId = params.get('ownerId');
        const fId = params.get('finderId');
        const item = params.get('item');

        let ownerData, finderData;

        async function fetchUniqueDetails() {
            try {
                const oRef = await db.collection("users").doc(oId).get();
                const fRef = await db.collection("users").doc(fId).get();

                ownerData = oRef.data();
                finderData = fRef.data();

                document.getElementById('itemName').innerText = item;
                document.getElementById('ownerID').innerText = oId;
                document.getElementById('finderID').innerText = fId;

                document.getElementById('ownerEmail').innerText = ownerData ? ownerData.email : "Not Registered";
                document.getElementById('finderEmail').innerText = finderData ? finderData.email : "Not Registered";

                document.getElementById('loading').style.display = 'none';
                document.getElementById('portalContent').style.display = 'block';
            } catch (e) {
                alert("Institutional Metadata Sync Error: " + e.message);
            }
        }

        function triggerCrossEmails() {
            // Detailed automated cross-exchange content
            const crossBody = `RECOVERY DISK INSTITUTIONAL ALERT\n\nA similarity match has been confirmed for the item: ${item}\n\n[OWNER DETAILS]\nRoll: ${oId}\nName: ${ownerData.name}\nEmail: ${ownerData.email}\n\n[FINDER DETAILS]\nRoll: ${fId}\nName: ${finderData.name}\nEmail: ${finderData.email}\n\nPlease proceed to the Admin Office for asset handover.`;

            // Prepare the notification bridge
            const mailLink = `mailto:${ownerData.email}?cc=${finderData.email}&subject=${encodeURIComponent("RECOVERY DISK | Match Confirmed: " + item)}&body=${encodeURIComponent(crossBody)}`;
            
            window.location.href = mailLink;
            alert(`Broadcasting Cross-Alert for ${oId} and ${fId}`);
        }

        if(oId && fId) fetchUniqueDetails();
    </script>
</body>
</html>
